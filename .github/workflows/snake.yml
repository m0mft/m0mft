name: Generate Snake Animation

on:
  schedule:
    # Runs automatically every 12 hours
    - cron: "0 */12 * * *"
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  
  # Automatically run on every push to main
  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Create dist directory
        run: mkdir -p dist
        
      - name: Fetch Latest GitHub Stats
        run: |
          curl -s "https://github-readme-stats.vercel.app/api?username=m0mft&show_icons=true&theme=transparent&hide_border=true&title_color=2EA043&icon_color=2EA043&text_color=ffffff&bg_color=0d1117&cache_seconds=1800" > dist/github-stats.svg
          curl -s "https://github-readme-stats.vercel.app/api/top-langs/?username=m0mft&layout=compact&theme=transparent&hide_border=true&title_color=2EA043&text_color=ffffff&bg_color=0d1117&cache_seconds=1800" > dist/top-langs.svg

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
